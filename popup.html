<!DOCTYPE html>
<html>
<head>
    <title>Bookmark Importer</title>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .import-btn {
            width: 100%;
            padding: 10px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .import-progress {
            display: none;
            margin-top: 15px;
            background: #f1f1f1;
            border-radius: 4px;
            overflow: hidden;
        }
        .import-progress.active {
            display: block;
        }
        .progress-fill {
            width: 0%;
            height: 4px;
            background: #4285f4;
            transition: width 0.3s ease;
        }
        .import-status {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
        .progress-text {
            margin-top: 5px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <button class="import-btn">Import Chrome Bookmarks</button>
    <div class="import-progress">
        <div class="progress-fill"></div>
        <div class="import-status"></div>
        <div class="progress-text"></div>
    </div>
    <script src="bookmark-importer.js"></script>
</body>
</html>
