<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Workspace — Logo Design Exploration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #FAFAFA;
            color: #1A1A1A;
            overflow-x: hidden;
        }

        .font-mono {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
        }

        /* Subtle grain texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Logo hover effects */
        .logo-card {
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-card:hover {
            transform: translateY(-4px);
        }

        .logo-canvas {
            position: relative;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Aura effect on hover */
        .logo-aura {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            transform: scale(0.5);
            opacity: 0;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            filter: blur(40px);
            pointer-events: none;
        }

        .logo-card:hover .logo-aura {
            transform: scale(1);
            opacity: 1;
        }

        /* Divider animation */
        .divider-line {
            width: 0;
            height: 1px;
            background: #1A1A1A;
            opacity: 0.2;
            transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-card:hover .divider-line {
            width: 100%;
        }

        /* Showcase image effects */
        .showcase-img {
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            border-radius: 8px;
            overflow: hidden;
        }

        .showcase-img:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }

        /* Typography refinements */
        .tracking-ultra-wide {
            letter-spacing: 0.2em;
        }

        .text-balance {
            text-wrap: balance;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const FocusNode = () => (
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="12" fill="#3b82f6" />
            <circle cx="50" cy="20" r="4" fill="currentColor" />
            <circle cx="50" cy="80" r="4" fill="currentColor" />
            <circle cx="20" cy="50" r="4" fill="currentColor" />
            <circle cx="80" cy="50" r="4" fill="currentColor" />
          </svg>
        );

        const CodeMatrix = () => (
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <g fill="currentColor">
              <rect x="15" y="15" width="15" height="15" rx="4" />
              <rect x="35" y="15" width="15" height="15" rx="4" />
              <rect x="55" y="15" width="15" height="15" rx="4" />
              <rect x="75" y="15" width="15" height="15" rx="4" />
              
              <rect x="15" y="35" width="15" height="15" rx="4" />
              <rect x="75" y="35" width="15" height="15" rx="4" />
              
              <rect x="15" y="55" width="15" height="15" rx="4" />
              <rect x="75" y="55" width="15" height="15" rx="4" />
              
              <rect x="15" y="75" width="15" height="15" rx="4" />
              <rect x="35" y="75" width="15" height="15" rx="4" />
              <rect x="55" y="75" width="15" height="15" rx="4" />
              <rect x="75" y="75" width="15" height="15" rx="4" />
              
              <rect x="40" y="40" width="20" height="20" rx="6" fill="#3b82f6" />
            </g>
          </svg>
        );

        const TerminalFlow = () => (
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <clipPath id="circle-clip">
                <circle cx="50" cy="50" r="45" />
              </clipPath>
            </defs>
            <g clipPath="url(#circle-clip)" stroke="currentColor" strokeLinecap="round">
              <line x1="10" y1="20" x2="90" y2="20" strokeWidth="3" />
              <line x1="10" y1="35" x2="90" y2="35" strokeWidth="2" opacity="0.6" />
              <line x1="10" y1="50" x2="90" y2="50" strokeWidth="4" stroke="#3b82f6" />
              <line x1="10" y1="65" x2="90" y2="65" strokeWidth="2" opacity="0.6" />
              <line x1="10" y1="80" x2="90" y2="80" strokeWidth="3" />
            </g>
          </svg>
        );

        const LogicHex = () => (
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <polygon points="50,10 85,30 85,70 50,90 15,70 15,30" fill="none" stroke="currentColor" strokeWidth="3" />
            <circle cx="50" cy="10" r="3" fill="currentColor" />
            <circle cx="85" cy="30" r="3" fill="currentColor" />
            <circle cx="85" cy="70" r="3" fill="currentColor" />
            <circle cx="50" cy="90" r="3" fill="currentColor" />
            <circle cx="15" cy="70" r="3" fill="currentColor" />
            <circle cx="15" cy="30" r="3" fill="currentColor" />
            <circle cx="50" cy="50" r="8" fill="#3b82f6" />
          </svg>
        );

        const PrecisionArc = () => (
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <g fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round">
              <path d="M 50 15 A 35 35 0 1 1 15 50" />
              <path d="M 70 50 A 20 20 0 1 1 30 50" stroke="#3b82f6" />
              <circle cx="50" cy="50" r="4" fill="currentColor" stroke="none" />
            </g>
          </svg>
        );

        const DevAbstraction = () => (
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <g fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round">
              <line x1="35" y1="20" x2="35" y2="80" />
              <path d="M 35 20 C 70 20, 70 80, 35 80" />
              <circle cx="50" cy="50" r="6" fill="#3b82f6" stroke="none" />
            </g>
          </svg>
        );

        const LogoShowcase = () => {
            const logos = [
                {
                    Component: FocusNode,
                    title: "Focus Node",
                    subtitle: "Geometric Centrality",
                    philosophy: "A central core representing the developer's primary task, surrounded by peripheral nodes that signify the tools and context under control."
                },
                {
                    Component: CodeMatrix,
                    title: "Code Matrix",
                    subtitle: "Structured Modularity",
                    philosophy: "A grid representing the modular nature of code, with a central blue focus point highlighting the active workspace."
                },
                {
                    Component: TerminalFlow,
                    title: "Terminal Flow",
                    subtitle: "Rhythmic Logic",
                    philosophy: "Dense parallel lines mimicking the rhythm of a code editor, with a primary blue line representing the current line of focus."
                },
                {
                    Component: LogicHex,
                    title: "Logic Hex",
                    subtitle: "Stable Framework",
                    philosophy: "A hexagon representing structural stability and the interconnected nature of modern software development frameworks."
                },
                {
                    Component: PrecisionArc,
                    title: "Precision Arc",
                    subtitle: "Iterative Target",
                    philosophy: "Concentric arcs suggesting the iterative nature of development, with a central target for absolute focus."
                },
                {
                    Component: DevAbstraction,
                    title: "Dev Abstraction",
                    subtitle: "Minimal Identity",
                    philosophy: "A geometric abstraction of the letter 'D', combining a solid stem with a fluid arc and a central focus point."
                }
            ];

            return (
                <div className="min-h-screen flex flex-col items-center py-20 px-6">

                    {/* Header */}
                    <div className="text-center mb-20 max-w-3xl">
                        <h1 className="text-6xl md:text-7xl font-extralight tracking-wider mb-6">
                            Developer Workspace
                        </h1>
                        <p className="font-mono text-xs opacity-40 uppercase tracking-ultra-wide mb-8">
                            Focus. Efficiency. Logic.
                        </p>
                        <div className="w-12 h-[1px] bg-[#1A1A1A] mx-auto opacity-30"></div>
                    </div>

                    {/* Logo Grid */}
                    <div className="max-w-7xl w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16 mb-32">
                        {logos.map((logo, index) => (
                            <div key={index} className="flex flex-col items-center logo-card cursor-pointer">

                                {/* Logo Canvas */}
                                <div className="w-64 h-64 mb-10 flex items-center justify-center relative">
                                    <div className="logo-aura"></div>
                                    <div className="w-32 h-32 relative z-10 logo-canvas">
                                        <logo.Component />
                                    </div>
                                </div>

                                {/* Text Description */}
                                <div className="text-center w-full px-4">
                                    <h2 className="text-xl font-medium tracking-wider mb-2 uppercase">
                                        {logo.title}
                                    </h2>
                                    <h3 className="text-xs font-mono opacity-50 tracking-widest mb-6">
                                        {logo.subtitle}
                                    </h3>
                                    <p className="text-sm leading-relaxed opacity-70 text-left font-light text-balance">
                                        {logo.philosophy}
                                    </p>
                                </div>

                                {/* Bottom Divider */}
                                <div className="divider-line mt-8 mx-auto"></div>
                            </div>
                        ))}
                    </div>

                    {/* Footer */}
                    <div className="mt-32 max-w-2xl text-center">
                        <p className="font-mono text-xs opacity-40 uppercase tracking-ultra-wide leading-loose">
                            Generated with Logo Generator<br/>
                            2026
                        </p>
                    </div>

                </div>
            );
        };

        ReactDOM.render(<LogoShowcase />, document.getElementById('root'));
    </script>

</body>
</html>
